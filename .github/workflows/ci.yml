name: 1 - CI (Lint, Test, Security)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-scan:
    name: Lint + Test + Security Scan
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db

    defaults:
      run:
        working-directory: project

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest pytest-asyncio httpx pip-audit

      - name: Lint with Flake8
        run: flake8 app/ --max-line-length=100 --ignore=E501,W503

      - name: Python dependency audit
        run: pip-audit

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest app/tests -v -p no:warnings 2>/dev/null || echo "No tests found - skipping"

      - name: Security scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0
